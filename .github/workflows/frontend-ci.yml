name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Format check
        working-directory: frontend
        run: bun run format:check

      - name: Lint
        working-directory: frontend
        run: bun run lint

      - name: TypeScript type check
        working-directory: frontend
        run: bun run typecheck

      - name: Unit tests with coverage gate
        working-directory: frontend
        run: bun run test -- --runInBand --coverage

      - name: Frontend smoke build
        working-directory: frontend
        run: bunx expo export --platform ios --output-dir dist-smoke --clear

      - name: Expo doctor
        working-directory: frontend
        run: bunx expo-doctor || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
