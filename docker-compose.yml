services:
  postgres:
    image: postgres:16-alpine
    container_name: ghost-postgres
    environment:
      POSTGRES_DB: ghost_db
      POSTGRES_USER: ghost_user
      POSTGRES_PASSWORD: ghost_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghost_user -d ghost_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghost-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ghost_db
      SPRING_DATASOURCE_USERNAME: ghost_user
      SPRING_DATASOURCE_PASSWORD: ghost_pass
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ghost-dev-local-secret-change-this-value-please-32b
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
