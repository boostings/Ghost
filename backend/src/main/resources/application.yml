server:
  port: ${PORT:8080}

spring:
  main:
    banner-mode: off
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ghost_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:ghost_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:ghost_pass}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:20000}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

resend:
  api-key: ${RESEND_API_KEY:}
  api-url: ${RESEND_API_URL:https://api.resend.com/emails}
  from: ${RESEND_FROM:${RESEND_FROM_EMAIL:Ghost <noreply@resonating.app>}}

rate-limit:
  trust-proxy-headers: false
  trusted-proxies:

logging:
  pattern:
    level: "%5p [req:%X{requestId:-}]"
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.ghost: INFO
