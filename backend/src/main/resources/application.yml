server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ghost_db
    username: ghost_user
    password: ghost_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-change-me-in-production-this-must-be-at-least-256-bits}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO
    com.ghost: INFO
